# transitions.yaml â€” State machine definitions for all workflows
# Referenced by orchestrator agents and skill prompts.
# Each transition has: id, from, to, condition, and optional type.

product:
  states: [vision, roadmap, research, arch, wbs, context]
  entry: vision
  terminal: context
  transitions:
    - id: P1
      from: ENTRY
      to: vision
      condition: Always
    - id: P2
      from: vision
      to: roadmap
      condition: Vision doc created
    - id: P3
      from: roadmap
      to: research
      condition: Roadmap has phases defined
    - id: P4
      from: research
      to: roadmap
      condition: "Back-loop: research invalidates roadmap assumptions"
      type: back-loop
      guard: Must document what changed and why
    - id: P5
      from: research
      to: arch
      condition: Research complete, no roadmap changes needed
    - id: P6
      from: arch
      to: research
      condition: "Back-loop: architecture reveals unknowns"
      type: back-loop
      guard: Must document what changed and why
    - id: P7
      from: arch
      to: wbs
      condition: Architecture defined
    - id: P8
      from: wbs
      to: arch
      condition: "Back-loop: WBS reveals architectural gaps"
      type: back-loop
      guard: Must document what changed and why
    - id: P9
      from: wbs
      to: context
      condition: WBS complete
    - id: P10
      from: context
      to: "EXITâ†’feature:plan"
      condition: Always â€” start first milestone from roadmap
    - id: P11
      from: SURFACE-IN
      to: wbs
      condition: Lower-level workflow discovers new work
      type: surface-in
    - id: P12
      from: SURFACE-IN
      to: arch
      condition: Lower-level workflow discovers architectural gap
      type: surface-in

feature:
  states: [spec, research, plan, build, verify-auto, verify-human, verify-codify, ship, finalize, refactor]
  entry:
    complex: spec
    simple: plan
  terminal: [finalize, refactor]
  small_simple_criteria:
    - No new data models or API endpoints
    - No architectural decisions required
    - Describable in â‰¤ 4 sentences
    - Estimated < 4 hours of agent work
    - Estimated â‰¤ ~200 lines of new/changed code
  per_phase_loop: [build, verify-auto, verify-human, verify-codify]
  transitions:
    - id: F1
      from: ENTRY
      to: spec
      condition: Feature is complex (fails small/simple criteria)
    - id: F2
      from: ENTRY
      to: plan
      condition: Feature is small/simple (all criteria met)
    - id: F3
      from: spec
      to: research
      condition: Unknowns exist
    - id: F4
      from: spec
      to: plan
      condition: No unknowns, spec is clear
    - id: F5
      from: research
      to: plan
      condition: Research complete
    - id: F6
      from: research
      to: spec
      condition: "Back-loop: research reveals spec is wrong"
      type: back-loop
    - id: F7
      from: plan
      to: build
      condition: Plan created with phases (starts phase 1)
    - id: F8
      from: build
      to: verify-auto
      condition: Phase implementation complete
    - id: F9
      from: verify-auto
      to: build
      condition: "Back-loop: tests fail"
      type: back-loop
    - id: F10
      from: verify-auto
      to: verify-human
      condition: Tests pass
    - id: F11
      from: verify-human
      to: verify-codify
      condition: Nothing for human to test â€” agent presents reasoning, human confirms skip
    - id: F12
      from: verify-human
      to: build
      condition: "Back-loop: human rejects"
      type: back-loop
    - id: F13
      from: verify-human
      to: verify-codify
      condition: Human approves happy path
    - id: F14
      from: verify-codify
      to: verify-human
      condition: "Back-loop: new tests reveal issues human missed"
      type: back-loop
    - id: F15
      from: verify-codify
      to: build
      condition: Tests written, more phases remain (advance to next phase)
    - id: F16
      from: verify-codify
      to: ship
      condition: Tests written, all phases complete
    - id: F17
      from: ship
      to: finalize
      condition: Shipped / PR ready
    - id: F18
      from: finalize
      to: refactor
      condition: Tech debt identified
    - id: F19
      from: finalize
      to: "EXITâ†’reflect"
      condition: No tech debt, feature done
    - id: F20
      from: refactor
      to: plan
      condition: "Refactor needs a plan â€” CONSTRAINT: scoped to cleanup only, no new features"
    - id: F21
      from: refactor
      to: "EXITâ†’reflect"
      condition: Refactor complete
    - id: F22
      from: build
      to: research
      condition: "REDIRECT: hit unknown during implementation â€” pause, research, return"
      type: redirect
    - id: F23
      from: build
      to: plan
      condition: "Back-loop: plan is wrong/incomplete"
      type: back-loop
    - id: F24
      from: verify-auto
      to: spec
      condition: "Back-loop: tests reveal spec was wrong"
      type: back-loop
    - id: F25
      from: build
      to: "SURFACEâ†’product:wbs"
      condition: Discovered module/component not in WBS
      type: surface
      mode: note-and-continue
    - id: F26
      from: build
      to: "SURFACEâ†’product:arch"
      condition: Architectural change needed
      type: surface
      mode: pause-and-escalate
    - id: F27
      from: ANY
      to: "incident:report"
      condition: Something breaks
      type: interrupt
    - id: F28
      from: SURFACE-IN
      to: spec
      condition: Task escalated to feature
      type: surface-in

task:
  states: [plan, act, close]
  entry: plan
  terminal: close
  transitions:
    - id: T1
      from: ENTRY
      to: plan
      condition: Always
    - id: T2
      from: plan
      to: act
      condition: Plan is clear, ready to implement
    - id: T3
      from: plan
      to: "ESCALATEâ†’feature:spec"
      condition: '"This is bigger than a task" â€” close task, update docs, open feature'
      type: escalate
    - id: T4
      from: plan
      to: "REDIRECTâ†’feature:research"
      condition: Research needed â€” pause task, research, return
      type: redirect
    - id: T5
      from: act
      to: close
      condition: Implementation complete, no issues
    - id: T6
      from: act
      to: plan
      condition: "Back-loop: need to re-plan"
      type: back-loop
    - id: T7
      from: act
      to: "SURFACEâ†’feature:spec"
      condition: Discovered something bigger (note-and-continue or pause-and-escalate depending on blocker status)
      type: surface
    - id: T8
      from: act
      to: "SURFACEâ†’product:wbs"
      condition: New work item discovered
      type: surface
      mode: note-and-continue
    - id: T9
      from: act
      to: "ESCALATEâ†’feature:spec"
      condition: Task grew beyond task scope â€” close task, open feature
      type: escalate
    - id: T10
      from: close
      to: EXIT
      condition: Always
    - id: T11
      from: close
      to: "EXITâ†’reflect"
      condition: Significant learning occurred (optional auto-trigger)

incident:
  states: [report, triage, investigate, mitigate, resolve]
  entry: report
  terminal: resolve
  transitions:
    - id: I1
      from: ENTRY
      to: report
      condition: Always
    - id: I2
      from: report
      to: triage
      condition: Report filed
    - id: I3
      from: triage
      to: investigate
      condition: Severity assessed (P0-P3 via human input), needs investigation
    - id: I4
      from: triage
      to: resolve
      condition: "Fast-close: false alarm or duplicate"
    - id: I5
      from: investigate
      to: investigate
      condition: "Self-loop: need more data (agent decides when to stop)"
      type: self-loop
    - id: I6
      from: investigate
      to: mitigate
      condition: Root cause found
    - id: I7
      from: investigate
      to: resolve
      condition: "Fast-close: false alarm discovered during investigation"
    - id: I8
      from: mitigate
      to: investigate
      condition: "Back-loop: fix didn't work, need more data"
      type: back-loop
    - id: I9
      from: mitigate
      to: resolve
      condition: Fix applied, monitoring period passed
    - id: I10
      from: resolve
      to: "EXITâ†’reflect"
      condition: Always (auto-trigger)
    - id: I11
      from: resolve
      to: "SURFACEâ†’task:plan"
      condition: Root cause needs proper fix (small)
      type: surface
    - id: I12
      from: resolve
      to: "SURFACEâ†’feature:spec"
      condition: Root cause needs architectural fix (large)
      type: surface

session:
  note: Not a state machine â€” meta-operations that attach to any workflow state
  operations:
    start:
      trigger: manual
      skill: session-start
      behavior: Routes user to correct workflow entry point
    pause:
      trigger: manual
      skill: session-pause
      behavior: Save current workflow + state + step to workflow/wip/ file
    resume:
      trigger: manual
      skill: session-resume
      behavior: Read state file, summarize, suggest resume skill
    reflect:
      trigger: "auto: after feature:finalize, feature:refactor, incident:resolve. Optional: after task:close"
      skill: session-reflect
      behavior: Analyze session for wrong assumptions. Strongly prompt store-learning.
    store-learning:
      trigger: manual (prompted by reflect)
      skill: session-store-learning
      behavior: Classify learning (global vs project), propose storage, execute after human confirmation

surface:
  modes:
    note-and-continue:
      when: Discovery is NOT a blocker
      behavior: Log to workflow/backlog.md, annotate current WIP plan, continue working
    pause-and-escalate:
      when: Discovery IS a blocker
      behavior: Pause current workflow, create higher-level item, address it, resume
  escalate_criteria:
    - Discovery changes an interface being actively coded against
    - An architectural decision is required before proceeding
    - Current work would be invalidated without the change
  default: note-and-continue
  backlog_review:
    during_plan: Lightweight scan for high-priority items matching current workflow level
    during_finalize_close: Full backlog review, surface unresolved items to user
  entry_format: |
    ## SURFACE-<timestamp>
    - **Source:** <current workflow>:<current step>
    - **Target level:** <product|feature>:<suggested step>
    - **Type:** new-work | gap | tech-debt | bug
    - **Summary:** <what was discovered>
    - **Context:** <why it matters>
    - **Suggested action:** <what should be done>
    - **Priority:** low | medium | high
    - **Status:** pending

escalate:
  behavior: |
    1. Update all docs to reflect escalation
    2. Mark current item as "Escalated to [target]", close/archive it
    3. Create higher-level item, enter that workflow
    4. No resume of original â€” it's been absorbed

redirect:
  behavior: |
    1. Pause current workflow (save state)
    2. Enter the other workflow/step
    3. On return, evaluate: did findings change the plan?
       - If no: auto-flow results into plan, annotate, continue
       - If yes: re-plan before resuming act
